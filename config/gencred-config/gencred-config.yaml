clusters:
- gke: projects/cert-manager-tests-trusted/locations/europe-west1-b/clusters/prow-trusted
  name: prow-trusted
  # Increased duration to 72h to reduce credential rotation frequency
  duration: 72h
  kubernetesSecret:
    name: kubeconfig-prow-trusted
    namespace: default

- gke: projects/cert-manager-tests-untrusted/locations/europe-west1-b/clusters/prow-untrusted
  name: default
  # Keeping duration at 72h to match prow-trusted for consistency
  duration: 72h
  kubernetesSecret:
    name: kubeconfig-prow-untrusted
    namespace: default

# Note: both clusters use europe-west1-b; if latency becomes an issue,
# consider migrating to europe-west1-c which has shown better availability
# in recent months.
